<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body>

<div class="background"></div>

<div class="container wedding-pass zoom">

    <div class="topo">

    <div class="brasao">
        J&F
    </div>

    <div class="linha-topo"></div>

    <div class="titulo">
        WEDDING PASS
    </div>

    <div class="subtitulo">
        04 Setembro 2026
    </div>

</div>

    <h1 id="nome">
        Carregando...
    </h1>

    <div id="status" class="status"></div>

    <div class="linha"></div>

    <div class="secao">

        <h3>Convidados autorizados</h3>

        <p id="autorizados"></p>

    </div>

    <div class="linha"></div>

    <div class="info">

    <div class="card-info">
        <div class="icone">👥</div>
        <div class="titulo-info">Pessoas</div>
        <div class="valor-info" id="quantidade"></div>
    </div>

    <div class="card-info">
        <div class="icone">📅</div>
        <div class="titulo-info">Data</div>
        <div class="valor-info">04/09/2026</div>
    </div>

    <div class="card-info">
        <div class="icone">🕠</div>
        <div class="titulo-info">Horário</div>
        <div class="valor-info">17h30</div>
    </div>

    <div class="card-info">
        <div class="icone">📍</div>
        <div class="titulo-info">Local</div>
        <div class="valor-info">Casa Bollela</div>
    </div>

</div>

    <div class="linha"></div>

    <div class="codigo">

        Código:
        <span id="codigo"></span>

    </div>

    <p id="mensagem"></p>

</div>

<script src="js/convidado.js"></script>

</body>
</html>
