<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>J&F Wedding Guest Pass</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/wedding-pass.css">
<link rel="stylesheet" href="css/animations.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="background"></div>

<main class="pass">

    <header class="pass-header">

      <div class="monograma">

    <img
        src="assets/monograma.png"
        alt="Monograma J&F">

</div>

        <div class="linha-dourada"></div>

        <div class="pass-title">
            WEDDING GUEST PASS
        </div>

        <div class="pass-local">
            Casa Bollela
        </div>

        <div class="pass-data">
            04 Setembro 2026
        </div>

    </header>

    <section>

        <h1 id="nome">
            Carregando...
        </h1>

        <div id="status" class="status"></div>

    </section>

    <section class="bloco">

        <h2>
            Convidados autorizados
        </h2>

        <div id="autorizados"></div>

    </section>

    <section class="cards">

        <div class="info-card">

    <div class="icone">
        <i class="fa-solid fa-users"></i>
    </div>

    <div class="conteudo-card">

        <span class="label">
            Pessoas
        </span>

        <span id="quantidade" class="valor"></span>

    </div>

</div>

        <div class="info-card">

            <i class="fa-solid fa-calendar-days"></i>
            </div>

            <span class="label">
                Data
            </span>

            <span class="valor">
                04/09/2026
            </span>

        </div>

        <div class="info-card">

           <i class="fa-regular fa-clock"></i>
            </div>

            <span class="label">
                Horário
            </span>

            <span class="valor">
                17h30
            </span>

        </div>

        <div class="info-card">

            <i class="fa-solid fa-location-dot"></i>
            </div>

            <span class="label">
                Local
            </span>

            <span class="valor">
                Casa Bollela
            </span>

        </div>

    </section>

    <footer>

        <div class="pass-id">

            PASS ID

            <span id="codigo"></span>

        </div>

        <div id="mensagem" class="mensagem"></div>

    </footer>

</main>

<script src="js/convidado.js"></script>

</body>
</html>
